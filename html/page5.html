<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>In Bảng Cửu Chương</title>  
</head>
<body>

    <form id="formInBCC">
        <h2>In Bảng Cửu Chương</h2>
        <label>Nhập số từ 2 đến 9: </label>
        <input type="number" id="soInput" min="2" max="9" value="5">
        <button type="button" onclick="inBCC()">IN</button>
        <hr>
        <div id="kq" style="line-height: 1.6; font-family: monospace;"></div>
    </form>
    <script>
        function inBCC() {
            const myNumber = document.getElementById("soInput");
            let num = parseInt(myNumber.value);
            let kq = "";
            if (isNaN(num)) {
                alert("Vui lòng nhập một số!");
                return;
            }
            for (let i = 1; i <= 10; i++) {
                kq += num + " x " + i + " = " + (num * i) + "<br>";
            }

            document.getElementById("kq").innerHTML = kq;
        }
    </script>

</body>
</html>
